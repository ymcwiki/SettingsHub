name: Test

on:
  workflow_call:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  headless:
    name: Headless (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install test dependency
        run: python -m pip install -r requirements-dev.txt
      - name: Run headless suite
        run: python tests/run_headless.py

  package-smoke:
    name: Package smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and validate local package
        run: python scripts/package.py ci
